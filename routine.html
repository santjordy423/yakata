<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかえり！</title>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8E7;
    --coral: #FF6B5B;
    --mustard: #F5C518;
    --mint: #5ECFA0;
    --navy: #1E2D5A;
    --pink: #FF9EBB;
    --lavender: #C9B8FF;
  }

  html { color-scheme: light only; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream) !important;
    color: var(--navy) !important;
    min-height: 100vh;
    font-family: 'Kiwi Maru', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(30,45,90,0.055) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }

  /* confettiキャンバス */
  #confettiCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 {
    font-family: 'Kiwi Maru', serif;
    font-weight: 500;
    font-size: 42px;
    color: var(--navy);
    line-height: 1;
  }
  .header h1 .c1 { color: var(--coral); }
  .header h1 .c2 { color: var(--mustard); }
  .header h1 .c3 { color: var(--mint); }
  .header h1 .c4 { color: var(--pink); }
  .header h1 .c5 { color: var(--lavender); }

  .progress-wrap {
    margin-top: 12px;
    background: #fff;
    border: 2.5px solid var(--navy);
    border-radius: 99px;
    height: 18px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--navy);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--mustard), var(--coral));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  .progress-text {
    margin-top: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--navy);
    text-align: right;
  }

  .mode-switch { display: flex; gap: 8px; margin-bottom: 18px; }
  .mode-btn {
    flex: 1;
    height: 46px;
    border: 2.5px solid var(--navy);
    border-radius: 12px;
    font-family: 'Kiwi Maru', serif;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    background: #fff;
    color: var(--navy);
    box-shadow: 3px 3px 0 var(--navy);
    transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .mode-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .mode-btn.active {
    background: var(--navy);
    color: #fff;
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--navy);
  }
  .mode-btn.active svg { stroke: #fff !important; }

  .schedule-header {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--lavender);
    border: 2.5px solid var(--navy);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 14px;
    box-shadow: 3px 3px 0 var(--navy);
  }
  .schedule-header.show { display: flex; }
  .schedule-header label {
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    white-space: nowrap;
  }
  .time-input {
    border: 2px solid var(--navy);
    border-radius: 8px;
    padding: 4px 8px;
    font-family: 'Kiwi Maru', serif;
    font-size: 17px;
    color: var(--navy);
    background: #fff;
    width: 110px;
    outline: none;
  }
  .total-time {
    font-size: 12px;
    font-weight: 500;
    color: var(--navy);
    opacity: 0.6;
    margin-left: auto;
    white-space: nowrap;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 11px;
    background: #fff;
    border: 2.5px solid var(--navy);
    border-radius: 16px;
    padding: 13px 14px;
    box-shadow: 4px 4px 0 var(--navy);
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    user-select: none;
  }
  .task-item:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--navy);
  }
  .task-item.done { background: var(--mint); }
  .task-item.done .task-label { text-decoration: line-through; opacity: 0.55; }
  .task-item.done .task-time-tag { background: #d4d4d4; border-color: #aaa; color: #777; }

  .group-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 4px;
  }
  .group-divider span {
    font-size: 11px;
    font-weight: 500;
    color: var(--navy);
    opacity: 0.38;
    white-space: nowrap;
  }
  .group-divider::before,
  .group-divider::after {
    content: '';
    flex: 1;
    height: 1.5px;
    background: var(--navy);
    opacity: 0.15;
    border-radius: 99px;
  }

  .task-check {
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--navy);
    border-radius: 8px;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .task-check svg { width: 16px; height: 16px; display: none; }
  .task-item.done .task-check { background: #fff; }
  .task-item.done .task-check svg { display: block; }

  .task-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 2px solid var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .task-icon svg { width: 20px; height: 20px; }

  .task-body { flex: 1; min-width: 0; }
  .task-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--navy);
    line-height: 1.3;
  }
  .task-sub {
    font-size: 11px;
    color: var(--navy);
    opacity: 0.45;
    margin-top: 2px;
  }

  .task-time-tag {
    display: none;
    font-family: 'Kiwi Maru', serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--navy);
    background: var(--mustard);
    border: 2px solid var(--navy);
    border-radius: 8px;
    padding: 3px 8px;
    white-space: nowrap;
    flex-shrink: 0;
    line-height: 1.5;
    text-align: center;
  }
  .schedule-mode .task-time-tag { display: block; }

  /* 完了メッセージ */
  .all-done {
    display: none;
    text-align: center;
    padding: 16px 8px;
    margin-bottom: 14px;
  }
  .all-done.show { display: block; }

  .turtle-spin {
    display: inline-block;
    width: 64px;
    height: 64px;
    animation: turtleSpin 1.2s cubic-bezier(.68,-.55,.27,1.55) forwards;
  }
  .turtle-spin svg {
    width: 64px;
    height: 64px;
  }

  @keyframes turtleSpin {
    0%   { transform: rotate(0deg) scale(0.3); opacity: 0; }
    60%  { transform: rotate(400deg) scale(1.15); opacity: 1; }
    80%  { transform: rotate(350deg) scale(0.95); }
    100% { transform: rotate(360deg) scale(1); opacity: 1; }
  }

  .all-done p {
    font-family: 'Kiwi Maru', serif;
    font-weight: 500;
    font-size: 20px;
    color: var(--coral);
    margin-top: 10px;
    animation: popIn 0.5s 0.8s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .reset-btn {
    width: 100%;
    height: 48px;
    background: var(--pink);
    border: 2.5px solid var(--navy);
    border-radius: 14px;
    font-family: 'Kiwi Maru', serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--navy);
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--navy);
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .reset-btn svg { width: 16px; height: 16px; }
  .reset-btn:active {
    transform: translate(2px,2px);
    box-shadow: 2px 2px 0 var(--navy);
  }

  .back-link {
    display: inline-block;
    margin-bottom: 18px;
    font-family: 'Kiwi Maru', serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    text-decoration: none;
    border: 2.5px solid var(--navy);
    border-radius: 10px;
    padding: 6px 16px;
    background: #fff;
    box-shadow: 3px 3px 0 var(--navy);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .back-link:hover {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--navy);
  }
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<div class="container">
  <a class="back-link" href="index.html">← 館に戻る</a>
  <div class="header">
    <h1><span class="c1">お</span><span class="c2">か</span><span class="c3">え</span><span class="c4">り</span><span class="c5">！</span></h1>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>

  <div class="mode-switch">
    <button class="mode-btn active" id="btnFree" onclick="setMode('free')">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
      じゆうに
    </button>
    <button class="mode-btn" id="btnSchedule" onclick="setMode('schedule')">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      スケジュール
    </button>
  </div>

  <div class="schedule-header" id="scheduleHeader">
    <label>開始</label>
    <input class="time-input" type="time" id="startTime">
    <span class="total-time" id="totalTimeLabel"></span>
  </div>

  <div class="all-done" id="allDone">
    <div class="turtle-spin" id="turtleSpinEl">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- 甲羅 -->
        <ellipse cx="12" cy="12" rx="6" ry="5" fill="#5ECFA0" stroke="var(--navy)" stroke-width="1.5"/>
        <!-- 甲羅の模様 -->
        <ellipse cx="12" cy="12" rx="3.5" ry="2.8" fill="none" stroke="var(--navy)" stroke-width="1"/>
        <line x1="12" y1="7" x2="12" y2="17" stroke="var(--navy)" stroke-width="0.8"/>
        <line x1="6" y1="12" x2="18" y2="12" stroke="var(--navy)" stroke-width="0.8"/>
        <!-- 頭 -->
        <circle cx="12" cy="5.5" r="2" fill="#FDE68A" stroke="var(--navy)" stroke-width="1.5"/>
        <!-- しっぽ -->
        <path d="M12 17 Q13 20 11.5 21" stroke="var(--navy)" stroke-width="1.5" fill="none"/>
        <!-- 前足 -->
        <path d="M6.5 10 Q4 9 3.5 11" stroke="var(--navy)" stroke-width="1.5" fill="none"/>
        <path d="M17.5 10 Q20 9 20.5 11" stroke="var(--navy)" stroke-width="1.5" fill="none"/>
        <!-- 後足 -->
        <path d="M7 14.5 Q5 16 5.5 18" stroke="var(--navy)" stroke-width="1.5" fill="none"/>
        <path d="M17 14.5 Q19 16 18.5 18" stroke="var(--navy)" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <p>ぜんぶできた！えらい！</p>
  </div>

  <div class="task-list" id="taskList"></div>

  <button class="reset-btn" onclick="resetAll()">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/>
    </svg>
    リセット
  </button>
</div>

<script>
// ── confetti ──────────────────────────────────────────
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId = null;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function launchConfetti() {
  resizeCanvas();
  const colors = ['#FF6B5B','#F5C518','#5ECFA0','#FF9EBB','#C9B8FF','#1E2D5A','#fff'];
  particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 80,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      angle: Math.random() * Math.PI * 2,
      spin:  (Math.random() - 0.5) * 0.2,
      vx:    (Math.random() - 0.5) * 3,
      vy:    2 + Math.random() * 4,
      alpha: 1,
    });
  }
  if (animId) cancelAnimationFrame(animId);
  animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.angle += p.spin;
    p.vy += 0.05; // 重力
    if (p.y > canvas.height) p.alpha -= 0.05;
    if (p.alpha > 0) alive = true;

    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  }
  if (alive) {
    animId = requestAnimationFrame(animateConfetti);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    animId = null;
  }
}

// ── SVGアイコン ────────────────────────────────────────
const ICONS = {
  egg: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 2 4 8 4 13a8 8 0 0 0 16 0C20 8 16 2 12 2z"/></svg>`,
  shirt: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg>`,
  droplet: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`,
  clipboard: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>`,
  leaf: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C8 10 5.9 16.17 3.82 22C3.82 22 8 22 12 19c0 0-2 3 0 3s8-8 8-14c0 0-1 0-3 0z"/></svg>`,
  hand: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34L3 18"/></svg>`,
  utensils: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="2" x2="3" y2="22"/><path d="M7 2v7a4 4 0 0 1-4 4"/><path d="M21 2v20M17 2v7a4 4 0 0 0 4 4"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
};

const ITEMS = [
  { type:'task', id:1, icon:'egg',       iconBg:'#FDE68A', label:'亀のお風呂・用意',       sub:'約5分',    minutes:5  },
  { type:'divider', label:'1セット目（15分）' },
  { type:'task', id:2, icon:'shirt',     iconBg:'#BFDBFE', label:'洗濯物を入れてたたむ',   sub:'約15分',   minutes:15 },
  { type:'task', id:3, icon:'droplet',   iconBg:'#BAE6FD', label:'水交換',                 sub:'約10分',   minutes:10 },
  { type:'task', id:4, icon:'clipboard', iconBg:'#E9D5FF', label:'亀のトイレ結果を登録',   sub:'約1分',    minutes:1  },
  { type:'task', id:5, icon:'leaf',      iconBg:'#BBF7D0', label:'亀のご飯用意',           sub:'約15分',   minutes:15 },
  { type:'divider', label:'2セット目（15分）' },
  { type:'task', id:6, icon:'hand',      iconBg:'#FCA5A5', label:'亀をお風呂から出す',     sub:'約10分',   minutes:10 },
  { type:'task', id:7, icon:'clipboard', iconBg:'#E9D5FF', label:'亀のトイレ結果を登録②', sub:'約1分',    minutes:1  },
  { type:'task', id:8, icon:'utensils',  iconBg:'#FED7AA', label:'自分のご飯用意',         sub:'15〜30分', minutes:25 },
];

const TASKS = ITEMS.filter(i => i.type === 'task');
const TOTAL_MIN = TASKS.reduce((s,t) => s + t.minutes, 0);

let mode = 'free';
let checks = JSON.parse(localStorage.getItem('routineChecks2') || '{}');
let wasAllDone = false;

function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
let startTime = localStorage.getItem('routineStart') || nowHHMM();

function addMinutes(hhmm, min) {
  const [h, m] = hhmm.split(':').map(Number);
  const total = h * 60 + m + min;
  return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

function calcSchedule() {
  let pivot = startTime;
  TASKS.forEach(t => {
    const c = checks[t.id];
    if (c && c.done && c.checkedAt) pivot = c.checkedAt;
  });
  let cur = pivot;
  return ITEMS.map(item => {
    if (item.type === 'divider') return item;
    const c = checks[item.id];
    const done = c && c.done;
    if (done) return { ...item, done:true,  schedStart:c.checkedAt, schedEnd:null };
    const start = cur, end = addMinutes(cur, item.minutes);
    cur = end;
    return { ...item, done:false, schedStart:start, schedEnd:end };
  });
}

function render() {
  const items = calcSchedule();
  const doneCount = TASKS.filter(t => checks[t.id] && checks[t.id].done).length;
  const total = TASKS.length;
  const allDone = doneCount === total;

  document.getElementById('progressBar').style.width = (doneCount/total*100) + '%';
  document.getElementById('progressText').textContent = `${doneCount} / ${total}`;

  const allDoneEl = document.getElementById('allDone');

  // 新たに全完了したときだけアニメ＆confetti発火
  if (allDone && !wasAllDone) {
    allDoneEl.classList.add('show');
    // 亀アニメをリセットして再生
    const turtle = document.getElementById('turtleSpinEl');
    turtle.style.animation = 'none';
    turtle.offsetHeight; // reflow
    turtle.style.animation = '';
    launchConfetti();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (!allDone) {
    allDoneEl.classList.remove('show');
  }
  wasAllDone = allDone;

  const sh = document.getElementById('scheduleHeader');
  sh.classList.toggle('show', mode === 'schedule');
  document.getElementById('startTime').value = startTime;
  document.getElementById('totalTimeLabel').textContent = `合計 ${TOTAL_MIN}分`;

  const list = document.getElementById('taskList');
  list.className = 'task-list' + (mode === 'schedule' ? ' schedule-mode' : '');

  list.innerHTML = items.map(item => {
    if (item.type === 'divider') {
      return `<div class="group-divider"><span>${item.label}</span></div>`;
    }
    const done = item.done;
    const timeLabel = done ? `✓ ${item.schedStart}` : `${item.schedStart}〜<br>${item.schedEnd}`;
    return `
      <div class="task-item ${done ? 'done' : ''}" onclick="toggle(${item.id})">
        <div class="task-check">${ICONS.check}</div>
        <div class="task-icon" style="background:${item.iconBg};">${ICONS[item.icon]}</div>
        <div class="task-body">
          <div class="task-label">${item.label}</div>
          <div class="task-sub">${item.sub}</div>
        </div>
        <span class="task-time-tag">${timeLabel}</span>
      </div>
    `;
  }).join('');
}

function toggle(id) {
  const c = checks[id];
  checks[id] = (c && c.done)
    ? { done:false, checkedAt:null }
    : { done:true,  checkedAt:nowHHMM() };
  localStorage.setItem('routineChecks2', JSON.stringify(checks));
  render();
}

function resetAll() {
  checks = {};
  wasAllDone = false;
  startTime = nowHHMM();
  localStorage.setItem('routineChecks2', JSON.stringify(checks));
  localStorage.setItem('routineStart', startTime);
  render();
}

function setMode(m) {
  mode = m;
  document.getElementById('btnFree').classList.toggle('active', m==='free');
  document.getElementById('btnSchedule').classList.toggle('active', m==='schedule');
  render();
}

document.getElementById('startTime').addEventListener('change', e => {
  startTime = e.target.value;
  localStorage.setItem('routineStart', startTime);
  render();
});

render();
</script>
</body>
</html>
